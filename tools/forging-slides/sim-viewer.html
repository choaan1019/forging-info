<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simulation Viewer</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #1a1a1a;
    display: flex; flex-direction: column;
    height: 100vh; overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
  }

  /* ── STAGE ── */
  #stage {
    flex: 1; min-height: 0;
    display: flex; align-items: center; justify-content: center;
    perspective: 2400px;
    gap: 3px;
    padding: 6px 10px;
    overflow: hidden;
  }

  /* ── PAGE CARDS ── */
  .page-wrap {
    position: relative;
    height: 100%; max-height: 100%;
    aspect-ratio: 16/9;
    flex-shrink: 0;
    max-width: 48%;
  }

  .page-wrap img {
    width: 100%; height: 100%;
    object-fit: contain;
    border-radius: 4px;
    display: block;
    background: #fff;
    box-shadow: 0 4px 24px rgba(0,0,0,.5);
  }

  /* spine */
  #spine {
    width: 5px;
    align-self: stretch;
    background: linear-gradient(90deg,#111 0%,#555 45%,#555 55%,#111 100%);
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── FLIP ── */
  #flip-wrap {
    position: absolute; inset: 0;
    transform-style: preserve-3d;
  }

  .flip-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .flip-face img { width:100%; height:100%; object-fit:contain; border-radius:4px; background:#fff; }
  .flip-back { transform: rotateY(180deg); }

  @keyframes fwdFlip {
    0%   { transform: rotateY(0deg);    z-index:5; }
    100% { transform: rotateY(-180deg); z-index:5; }
  }
  @keyframes bwdFlip {
    0%   { transform: rotateY(0deg);   z-index:5; }
    100% { transform: rotateY(180deg); z-index:5; }
  }

  .doing-fwd { animation: fwdFlip .5s ease-in-out forwards; transform-origin: left center; }
  .doing-bwd { animation: bwdFlip .5s ease-in-out forwards; transform-origin: left center; }

  /* ── CLICK ZONES ── */
  .click-zone { position:absolute; top:0; height:100%; width:50%; z-index:10; cursor:pointer; }
  .zone-l { left:0; }
  .zone-r { right:0; }

  /* ── THUMBNAILS ── */
  #strip {
    display: flex; gap: 5px;
    overflow-x: auto; padding: 4px 8px 5px;
    background: rgba(0,0,0,.55);
    scrollbar-width: thin; scrollbar-color: #555 transparent;
    flex-shrink: 0;
    align-items: center; height: 56px;
  }
  #strip::-webkit-scrollbar { height:3px; }
  #strip::-webkit-scrollbar-thumb { background:#555; border-radius:2px; }

  .thumb {
    flex-shrink:0; height:40px; width:auto; aspect-ratio:16/9;
    object-fit:cover; border-radius:2px; cursor:pointer; opacity:.45;
    border:2px solid transparent; transition:opacity .15s,border-color .15s;
  }
  .thumb:hover { opacity:.8; }
  .thumb.on { opacity:1; border-color:#FF8C00; }

  /* ── NAV BAR ── */
  #nav {
    display:flex; align-items:center; justify-content:center;
    gap:14px; padding:6px 0 8px;
    background:rgba(0,0,0,.7);
    flex-shrink:0;
  }
  .nb {
    background:rgba(255,140,0,.15); border:1px solid rgba(255,140,0,.45);
    color:#FF8C00; font-size:18px; font-weight:900;
    width:36px; height:36px; border-radius:50%; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background .15s;
  }
  .nb:hover:not(:disabled) { background:rgba(255,140,0,.35); }
  .nb:disabled { opacity:.2; cursor:default; }
  #counter { font-size:13px; font-weight:700; color:#aaa; min-width:64px; text-align:center; }
</style>
</head>
<body>

<div id="stage">
  <!-- LEFT page -->
  <div class="page-wrap" id="left-wrap">
    <img id="img-left" src="" alt="">
    <div class="click-zone zone-l" onclick="go(-1)"></div>
  </div>

  <div id="spine"></div>

  <!-- RIGHT page (flip mechanism) -->
  <div class="page-wrap" id="right-wrap" style="position:relative;">
    <!-- behind: next-next page shown during flip -->
    <img id="img-behind" src="" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#fff;border-radius:4px;">
    <!-- flip card -->
    <div id="flip-wrap">
      <div class="flip-face"><img id="img-front" src="" alt=""></div>
      <div class="flip-face flip-back"><img id="img-back"  src="" alt=""></div>
    </div>
    <div class="click-zone zone-r" onclick="go(1)"></div>
  </div>
</div>

<!-- thumbnail strip -->
<div id="strip"></div>

<div id="nav">
  <button class="nb" id="btn-p" onclick="go(-1)">‹</button>
  <span id="counter">1 / 17</span>
  <button class="nb" id="btn-n" onclick="go(1)">›</button>
</div>

<script>
  const N = 17;
  const S = n => n>=1&&n<=N ? `./sim-slides/slide${String(n).padStart(2,'0')}.png` : '';
  let cur = 1, busy = false;

  function render() {
    document.getElementById('img-left').src   = S(cur);
    document.getElementById('img-front').src  = S(cur+1);
    document.getElementById('img-behind').src = S(cur+2);
    document.getElementById('img-back').src   = S(cur-1);
    document.getElementById('flip-wrap').className = '';
    document.getElementById('flip-wrap').style.transform = '';
    document.getElementById('counter').textContent = `${cur} – ${Math.min(cur+1,N)} / ${N}`;
    document.getElementById('btn-p').disabled = cur <= 1;
    document.getElementById('btn-n').disabled = cur+1 > N;
    document.querySelectorAll('.thumb').forEach((t,i)=>{
      t.classList.toggle('on', i+1===cur || i+1===cur+1);
    });
    document.querySelectorAll('.thumb.on')[0]?.scrollIntoView({inline:'nearest',behavior:'smooth'});
  }

  function go(dir) {
    if (busy) return;
    if (dir > 0 && cur+1 > N) return;
    if (dir < 0 && cur <= 1) return;
    busy = true;

    const fw = dir > 0;
    const fw_cls = fw ? 'doing-fwd' : 'doing-bwd';

    if (fw) {
      document.getElementById('img-front').src  = S(cur+1);
      document.getElementById('img-behind').src = S(cur+2);
      document.getElementById('img-back').src   = S(cur+3);  // revealed after flip
    } else {
      document.getElementById('img-back').src   = S(cur-1);
      document.getElementById('img-front').src  = S(cur);
      document.getElementById('img-behind').src = S(cur-2);
    }

    const fw_el = document.getElementById('flip-wrap');
    fw_el.classList.add(fw_cls);
    fw_el.addEventListener('animationend', () => {
      cur += fw ? 2 : -2;
      busy = false;
      render();
    }, { once: true });
  }

  // thumbnails
  const strip = document.getElementById('strip');
  for (let i=1;i<=N;i++){
    const img = document.createElement('img');
    img.src = S(i); img.className='thumb'; img.dataset.i=i;
    img.onclick = () => {
      const t = +img.dataset.i;
      if (busy || t===cur) return;
      // jump: normalize to odd number (left page)
      cur = t % 2 === 0 ? t-1 : t;
      render();
    };
    strip.appendChild(img);
  }

  document.addEventListener('keydown', e=>{
    if (e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(1);}
    if (e.key==='ArrowLeft')             {e.preventDefault();go(-1);}
  });

  render();
</script>
</body>
</html>
